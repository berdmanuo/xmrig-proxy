name: Build and Release xmrig-proxy (no-donate)

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:        # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-22.04   # 或 ubuntu-latest

    permissions:
      contents: write       # 需要写权限才能创建 Release

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential cmake libuv1-dev libssl-dev libhwloc-dev

      - name: Remove donation code
        run: |
          sed -i '/DonateStrategy/d' src/proxy/Proxy.h
          sed -i '/m_donate/d' src/proxy/Proxy.cpp
          sed -i '/#include.*DonateStrategy/d' src/proxy/Proxy.cpp

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          files: build/xmrig-proxy
          name: "xmrig-proxy ${{ github.ref_name }}"   # 用 tag 名称作为 Release 标题
          tag_name: ${{ github.ref }}
          body: |
            Automated build without donation code.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
