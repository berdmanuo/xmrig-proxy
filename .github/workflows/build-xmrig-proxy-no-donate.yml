name: Build xmrig-proxy for Ubuntu (no-donate)

on:
  push:
    branches: [ master ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04    # 20.04 LTS 兼容性最好，也可用 ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential cmake libuv1-dev libssl-dev libhwloc-dev

      - name: Remove donation code
        run: |
          # 注释掉头文件中的 DonateStrategy 成员
          sed -i '/DonateStrategy/d' src/proxy/Proxy.h
          # 删除 cpp 中所有对 m_donate 的调用和 include
          sed -i '/m_donate/d' src/proxy/Proxy.cpp
          sed -i '/#include.*DonateStrategy/d' src/proxy/Proxy.cpp

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-proxy-ubuntu-no-donate
          path: build/xmrig-proxy
