name: Build XMRig Proxy (No Donate)
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # 允许手动触发编译

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            cmake-args: ""
          - os: ubuntu-latest
            arch: arm64
            cmake-args: "-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++"
          - os: windows-latest
            arch: x64
            cmake-args: ""
          - os: macos-latest
            arch: x64
            cmake-args: ""
          - os: macos-latest
            arch: arm64
            cmake-args: "-DCMAKE_OSX_ARCHITECTURES=arm64"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Remove donation mechanism (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          # 1. 强制设置捐赠级别为0，忽略所有配置
          sed -i 's/m_donateLevel = reader.getInt("donate-level", kDefaultDonateLevel);/m_donateLevel = 0;/g' src/core/config/Config.cpp
          
          # 2. 让捐赠策略永远不激活
          sed -i 's/return m_active && m_level > 0 && m_workers > 256;/return false;/g' src/net/strategies/DonateStrategy.cpp
          
          # 3. 直接返回，不处理任何捐赠提交
          sed -i '/bool DonateStrategy::submit/a \    return false;' src/net/strategies/DonateStrategy.cpp
          
          # 4. 直接返回，不执行任何捐赠切换逻辑
          sed -i '/void DonateStrategy::tick/a \    return;' src/net/strategies/DonateStrategy.cpp
          
          # 5. 替换硬编码的捐赠地址为无效地址（彻底保险）
          sed -i 's/pool.xmrig.com:3333/127.0.0.1:0/g' src/net/strategies/DonateStrategy.cpp
          sed -i 's/48edfHu7V9Z84YzzMa6fUueoELZ9ZRXq9VetWzYGzKt52XU5xvqgzYnDK9URnRoJMk1j8nLwEVsaSWJ4fhdUyZijBGUicoD/disabled/g' src/net/strategies/DonateStrategy.cpp

      - name: Remove donation mechanism (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Windows 环境使用 PowerShell 替换文本
          (Get-Content src/core/config/Config.cpp) -replace 'm_donateLevel = reader.getInt\("donate-level", kDefaultDonateLevel\);', 'm_donateLevel = 0;' | Set-Content src/core/config/Config.cpp
          
          (Get-Content src/net/strategies/DonateStrategy.cpp) -replace 'return m_active && m_level > 0 && m_workers > 256;', 'return false;' | Set-Content src/net/strategies/DonateStrategy.cpp
          
          (Get-Content src/net/strategies/DonateStrategy.cpp) -replace 'bool DonateStrategy::submit\(const JobResult &result\)', "bool DonateStrategy::submit(const JobResult &result)`n    return false;" | Set-Content src/net/strategies/DonateStrategy.cpp
          
          (Get-Content src/net/strategies/DonateStrategy.cpp) -replace 'void DonateStrategy::tick\(uint64_t now\)', "void DonateStrategy::tick(uint64_t now)`n    return;" | Set-Content src/net/strategies/DonateStrategy.cpp
          
          (Get-Content src/net/strategies/DonateStrategy.cpp) -replace 'pool.xmrig.com:3333', '127.0.0.1:0' | Set-Content src/net/strategies/DonateStrategy.cpp
          (Get-Content src/net/strategies/DonateStrategy.cpp) -replace '48edfHu7V9Z84YzzMa6fUueoELZ9ZRXq9VetWzYGzKt52XU5xvqgzYnDK9URnRoJMk1j8nLwEVsaSWJ4fhdUyZijBGUicoD', 'disabled' | Set-Content src/net/strategies/DonateStrategy.cpp

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libssl-dev
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake openssl

      - name: Configure CMake (双重禁用捐赠)
        run: |
          mkdir build
          cd build
          cmake .. ${{ matrix.cmake-args }} -DCMAKE_BUILD_TYPE=Release -DWITH_DONATE=OFF

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/Release/xmrig-proxy.exe artifacts/
          else
            cp build/xmrig-proxy artifacts/
          fi
          cp README.md LICENSE artifacts/
          
          # 创建版本信息文件
          echo "XMRig Proxy No Donate Version" > artifacts/VERSION.txt
          echo "Build date: $(date)" >> artifacts/VERSION.txt
          echo "Donation level: 0% (completely removed)" >> artifacts/VERSION.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-proxy-no-donate-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/
          retention-days: 90 # 保留90天
