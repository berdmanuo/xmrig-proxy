name: Build xmrig-proxy without donation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Build version tag'
        required: true
        default: 'v1.0.0'
      disable_donation:
        description: 'Disable donation mechanism'
        required: true
        default: 'true'

env:
  BUILD_VERSION: ${{ github.event.inputs.build_version || 'latest' }}
  DISABLE_DONATION: ${{ github.event.inputs.disable_donation || 'true' }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: xmrig-proxy-linux
          - os: windows-latest
            artifact_name: xmrig-proxy-windows
          - os: macos-latest
            artifact_name: xmrig-proxy-macos
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up environment
      run: |
        echo "Building version: $BUILD_VERSION"
        echo "Disable donation: $DISABLE_DONATION"
    
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential cmake libuv1-dev libssl-dev libhwloc-dev
        
    - name: Install Windows dependencies
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake vcpkg -y
        vcpkg integrate install
        vcpkg install libuv:x64-windows openssl:x64-windows hwloc:x64-windows
    
    - name: Install macOS dependencies
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake libuv openssl hwloc
    
    - name: Remove donation mechanism
      if: env.DISABLE_DONATION == 'true'
      run: |
        echo "Removing donation code..."
        # 移除捐赠地址
        find . -type f -exec sed -i '' 's/48edfHu7V9Z84YzzMa6fUueoELZ9ZRXq9VetWzYGzKt52XU5xvqgzYnDK9URnRoJMk1j8nLwEVsaSWJ4fhdUyZijBGUicoD//g' {} \;
        
        # 设置捐赠级别为0
        find src/ -type f -exec sed -i '' 's/#define kDonateLevel [0-9]/#define kDonateLevel 0/g' {} \;
        find src/ -type f -exec sed -i '' 's/m_donateLevel = [0-9]/m_donateLevel = 0/g' {} \;
        
        # 移除捐赠连接逻辑
        find src/ -type f -name "*.cpp" -exec sed -i '' '/if (m_donateLevel > 0)/,/}/d' {} \;
        
        echo "Donation mechanism removed"
    
    - name: Configure and build
      run: |
        mkdir build
        cd build
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel
          cp Release/xmrig-proxy.exe .
        else
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
        fi
    
    - name: Package and upload
      run: |
        cd build
        BINARY_NAME="xmrig-proxy-${{ matrix.os }}-${BUILD_VERSION}"
        
        if [ "$RUNNER_OS" == "Linux" ]; then
          tar -czf "${BINARY_NAME}.tar.gz" xmrig-proxy
        elif [ "$RUNNER_OS" == "Darwin" ]; then
          tar -czf "${BINARY_NAME}.tar.gz" xmrig-proxy
        elif [ "$RUNNER_OS" == "Windows" ]; then
          7z a "${BINARY_NAME}.zip" xmrig-proxy.exe
        fi
        
        echo "Package created: ${BINARY_NAME}"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}-${{ env.BUILD_VERSION }}
        path: build/*.tar.gz
        if-no-files-found: ignore
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      if: matrix.os == 'windows-latest'
      with:
        name: ${{ matrix.artifact_name }}-${{ env.BUILD_VERSION }}
        path: build/*.zip
        if-no-files-found: ignore
